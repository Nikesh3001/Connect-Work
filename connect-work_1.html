// ============================================================
function handleFirestoreError(error, operationType, path) {
  const errInfo = {
    error: error instanceof Error ? error.message : String(error),
    authInfo: { userId: auth.currentUser?.uid, email: auth.currentUser?.email },
    operationType, path
  };
  console.error('Firestore Error: ', JSON.stringify(errInfo));
  throw new Error(JSON.stringify(errInfo));
}

const api = {
  login: async (email, password) => {
    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      const userDoc = await getDoc(doc(db, "users", userCredential.user.uid));
      if (!userDoc.exists()) throw new Error("User profile not found");
      return userDoc.data();
    } catch (error) { handleFirestoreError(error, 'get', "users"); throw error; }
  },
  socialLogin: async (provider, email, name) => {
    try {
      const googleProvider = new GoogleAuthProvider();
      const userCredential = await signInWithPopup(auth, googleProvider);
      const userRef = doc(db, "users", userCredential.user.uid);
      const userDoc = await getDoc(userRef);
      if (!userDoc.exists()) {
        const newUser = {
          id: userCredential.user.uid,
          name: userCredential.user.displayName || name || 'New User',
          email: userCredential.user.email || email,
          phone: '', location: '', language: 'en',
          role: 'client', roleSelected: false, isVerified: true, walletBalance: 0
        };
        await setDoc(userRef, newUser);
        await setDoc(doc(db, "public_profiles", newUser.id), { id: newUser.id, name: newUser.name, role: newUser.role, isVerified: newUser.isVerified });
        return newUser;
      }
      return userDoc.data();
    } catch (error) { handleFirestoreError(error, 'write', "users"); throw error; }
  },
  register: async (userData) => {
    try {
      const userCredential = await createUserWithEmailAndPassword(auth, userData.email, userData.password);
      const newUser = {
        id: userCredential.user.uid, name: userData.name, email: userData.email,
        phone: userData.phone || '', location: userData.location || '',
        language: 'en', role: 'client', roleSelected: false,
        isVerified: false, kycStatus: 'NOT_SUBMITTED', walletBalance: 0
      };
      await setDoc(doc(db, "users", newUser.id), newUser);
      await setDoc(doc(db, "public_profiles", newUser.id), { id: newUser.id, name: newUser.name, role: newUser.role, isVerified: newUser.isVerified });
      return newUser;
    } catch (error) { handleFirestoreError(error, 'write', "users"); throw error; }
  },
  resetPasswordRequest: async (email) => {
    try { await sendPasswordResetEmail(auth, email); return true; }
    catch (error) { handleFirestoreError(error, 'write', "auth"); throw error; }
  },
  logout: async () => { await signOut(auth); },
  updateUser: async (updates) => {
    if (!auth.currentUser) throw new Error("Not logged in");
    try {
      const userRef = doc(db, "users", auth.currentUser.uid);
      await updateDoc(userRef, updates);
      if (updates.name || updates.role || updates.isVerified !== undefined || updates.workerProfile) {
        const publicProfileRef = doc(db, "public_profiles", auth.currentUser.uid);
        const publicUpdates = {};
        if (updates.name) publicUpdates.name = updates.name;
        if (updates.role) publicUpdates.role = updates.role;
        if (updates.isVerified !== undefined) publicUpdates.isVerified = updates.isVerified;
        if (updates.workerProfile) publicUpdates.workerProfile = updates.workerProfile;
        await updateDoc(publicProfileRef, publicUpdates).catch(e => console.error("Failed to update public profile", e));
      }
      const updatedDoc = await getDoc(userRef);
      return updatedDoc.data();
    } catch (error) { handleFirestoreError(error, 'update', "users"); throw error; }
  },
  updatePaymentDetails: async (details) => {
    if (!auth.currentUser) throw new Error("Not logged in");
    try {
      const userRef = doc(db, "users", auth.currentUser.uid);
      const userDoc = await getDoc(userRef);
      const user = userDoc.data();
      const newPaymentDetails = { ...user.paymentDetails, ...details };
      const updates = { paymentDetails: newPaymentDetails };
      if ((newPaymentDetails.upiId || newPaymentDetails.bankAccount) && user.kycStatus === 'NOT_SUBMITTED') {
        updates.kycStatus = 'VERIFIED';
      }
      await updateDoc(userRef, updates);
      const updatedDoc = await getDoc(userRef);
      return updatedDoc.data();
    } catch (error) { handleFirestoreError(error, 'update', "users"); throw error; }
  },
  withdrawFunds: async (amount) => {
    if (!auth.currentUser) throw new Error("Not logged in");
    try {
      return await runTransaction(db, async (transaction) => {
        const userRef = doc(db, "users", auth.currentUser.uid);
        const userDoc = await transaction.get(userRef);
        const user = userDoc.data();
        if ((user.walletBalance || 0) < amount) throw new Error("Insufficient funds");
        if (!user.paymentDetails?.upiId && !user.paymentDetails?.bankAccount) throw new Error("No UPI ID or Bank Account linked");
        const newBalance = (user.walletBalance || 0) - amount;
        transaction.update(userRef, { walletBalance: newBalance });
        const dest = user.paymentDetails?.upiId || `Bank Acc ending in ${user.paymentDetails?.bankAccount?.slice(-4)}`;
        const notifRef = doc(collection(db, "notifications"));
        transaction.set(notifRef, { id: notifRef.id, userId: user.id, message: `₹${amount} withdrawn to ${dest} successfully.`, type: 'success', read: false, timestamp: Date.now() });
        return { ...user, walletBalance: newBalance };
      });
    } catch (error) { handleFirestoreError(error, 'write', "users/notifications"); throw error; }
  },
  addFunds: async (amount) => {
    if (!auth.currentUser) throw new Error("Not logged in");
    try {
      return await runTransaction(db, async (transaction) => {
        const userRef = doc(db, "users", auth.currentUser.uid);
        const userDoc = await transaction.get(userRef);
        const user = userDoc.data();
        const newBalance = (user.walletBalance || 0) + amount;
        transaction.update(userRef, { walletBalance: newBalance });
        const notifRef = doc(collection(db, "notifications"));
        transaction.set(notifRef, { id: notifRef.id, userId: user.id, message: `₹${amount} added to your wallet successfully.`, type: 'success', read: false, timestamp: Date.now() });
        return { ...user, walletBalance: newBalance };
      });
    } catch (error) { handleFirestoreError(error, 'write', "users/notifications"); throw error; }
  },
  postJob: async (jobData) => {
    try {
      const jobRef = doc(collection(db, "jobs"));
      const newJob = { ...jobData, id: jobRef.id, postedAt: Date.now(), status: 'OPEN', paymentStatus: 'PENDING', statusHistory: [{ status: 'OPEN', timestamp: Date.now(), note: 'Job Posted' }], interestedWorkerIds: [], isRated: false };
      await setDoc(jobRef, newJob);
      return newJob;
    } catch (error) { handleFirestoreError(error, 'create', "jobs"); throw error; }
  },
  getJobs: async (filter) => {
    try {
      const jobsRef = collection(db, "jobs");
      let q = query(jobsRef, orderBy("postedAt", "desc"));
      if (filter?.type === 'client') q = query(jobsRef, where("clientId", "==", filter.userId), orderBy("postedAt", "desc"));
      const snapshot = await getDocs(q);
      let jobs = snapshot.docs.map(d => d.data());
      if (filter?.type === 'worker') {
        const workerDoc = await getDoc(doc(db, "users", filter.userId));
        const worker = workerDoc.data();
        if (!worker) return [];
        jobs = jobs.filter(j => {
          if (j.assignedWorkerId === filter.userId) return true;
          if (j.status !== 'OPEN') return false;
          return worker.workerProfile?.categories.includes(j.category);
        });
      }
      return jobs;
    } catch (error) { handleFirestoreError(error, 'list', "jobs"); throw error; }
  },
  getJobById: async (jobId) => {
    try {
      const jobDoc = await getDoc(doc(db, "jobs", jobId));
      return jobDoc.exists() ? jobDoc.data() : undefined;
    } catch (error) { handleFirestoreError(error, 'get', "jobs"); throw error; }
  },
  expressInterest: async (jobId, workerId) => {
    try {
      return await runTransaction(db, async (transaction) => {
        const jobRef = doc(db, "jobs", jobId);
        const jobDoc = await transaction.get(jobRef);
        if (!jobDoc.exists()) throw new Error("Job not found");
        const job = jobDoc.data();
        if (!job.interestedWorkerIds.includes(workerId)) {
          job.interestedWorkerIds.push(workerId);
          transaction.update(jobRef, { interestedWorkerIds: job.interestedWorkerIds });
        }
        return job;
      });
    } catch (error) { handleFirestoreError(error, 'update', "jobs"); throw error; }
  },
  bookWorker: async (jobId, workerId, method = 'CASH') => {
    try {
      return await runTransaction(db, async (transaction) => {
        const jobRef = doc(db, "jobs", jobId);
        const jobDoc = await transaction.get(jobRef);
        if (!jobDoc.exists()) throw new Error("Job not found");
        const job = jobDoc.data();
        const workerRef = doc(db, "users", workerId);
        const workerDoc = await transaction.get(workerRef);
        if (!workerDoc.exists()) throw new Error("Worker not found");
        const worker = workerDoc.data();
        if (method === 'ONLINE') {
          const clientRef = doc(db, "users", job.clientId);
          const clientDoc = await transaction.get(clientRef);
          const client = clientDoc.data();
          if ((client.walletBalance || 0) < job.budget) throw new Error(`Insufficient wallet balance (₹${client.walletBalance}). Please add money or use Cash mode.`);
          transaction.update(clientRef, { walletBalance: (client.walletBalance || 0) - job.budget });
          job.paymentStatus = 'ESCROW_LOCKED';
        } else { job.paymentStatus = 'PENDING'; }
        job.assignedWorkerId = workerId;
        job.assignedWorkerName = worker.name;
        job.assignedWorkerPhone = worker.phone;
        job.assignedWorkerVerified = worker.isVerified;
        job.status = 'BOOKED';
        job.paymentMethod = method;
        job.completionCode = Math.random().toString(36).substr(2, 6).toUpperCase();
        job.statusHistory.push({ status: 'BOOKED', timestamp: Date.now(), note: `Worker assigned via ${method}. ${method === 'ONLINE' ? 'Funds locked in Escrow.' : 'Payment pending on completion.'}` });
        transaction.update(jobRef, job);
        return job;
      });
    } catch (error) { handleFirestoreError(error, 'write', "jobs/users"); throw error; }
  },
  completeJob: async (jobId) => {
    try {
      return await runTransaction(db, async (transaction) => {
        const jobRef = doc(db, "jobs", jobId);
        const jobDoc = await transaction.get(jobRef);
        if (!jobDoc.exists()) throw new Error("Job not found");
        const job = jobDoc.data();
        if (job.status !== 'BOOKED') throw new Error("Job is not in a booked state");
        const isEscrow = job.paymentMethod === 'ONLINE' || job.paymentStatus === 'ESCROW_LOCKED';
        const totalAmount = job.budget;
        const commission = totalAmount * 0.20;
        const workerPayout = totalAmount - commission;
        const workerRef = doc(db, "users", job.assignedWorkerId);
        const workerDoc = await transaction.get(workerRef);
        const worker = workerDoc.data();
        if (isEscrow) {
          transaction.update(workerRef, { walletBalance: (worker.walletBalance || 0) + workerPayout });
          const platformRef = doc(db, "platform", "data");
          const platformDoc = await transaction.get(platformRef);
          const currentRev = platformDoc.exists() ? platformDoc.data().revenue || 0 : 0;
          transaction.set(platformRef, { revenue: currentRev + commission }, { merge: true });
          job.paymentStatus = 'RELEASED';
          const notifRef = doc(collection(db, "notifications"));
          transaction.set(notifRef, { id: notifRef.id, userId: worker.id, message: `Work Approved! ₹${workerPayout} released to your wallet.`, type: 'payment', read: false, timestamp: Date.now() });
        } else {
          job.paymentStatus = 'RELEASED';
          const notifRef = doc(collection(db, "notifications"));
          transaction.set(notifRef, { id: notifRef.id, userId: worker.id, message: `Job Marked Complete. Please collect ₹${totalAmount} cash from client if not already done.`, type: 'info', read: false, timestamp: Date.now() });
        }
        job.status = 'COMPLETED';
        job.statusHistory.push({ status: 'COMPLETED', timestamp: Date.now(), note: `Job completed. Payment ${isEscrow ? 'released from Escrow' : 'settled via Cash'}.` });
        transaction.update(jobRef, job);
        return { success: true, payout: isEscrow ? workerPayout : 0, method: job.paymentMethod };
      });
    } catch (error) { handleFirestoreError(error, 'write', "jobs/users"); throw error; }
  },
  verifyAndPayout: async (jobId, code) => {
    try {
      return await runTransaction(db, async (transaction) => {
        const jobRef = doc(db, "jobs", jobId);
        const jobDoc = await transaction.get(jobRef);
        if (!jobDoc.exists()) throw new Error("Job not found");
        const job = jobDoc.data();
        if (job.completionCode !== code) throw new Error("Invalid QR Code / Security Token");
        if (job.status !== 'BOOKED') throw new Error("Job already completed or cancelled");
        const isEscrow = job.paymentMethod === 'ONLINE' || job.paymentStatus === 'ESCROW_LOCKED';
        const totalAmount = job.budget;
        const commission = totalAmount * 0.20;
        const workerPayout = totalAmount - commission;
        const workerRef = doc(db, "users", job.assignedWorkerId);
        const workerDoc = await transaction.get(workerRef);
        const worker = workerDoc.data();
        if (isEscrow) {
          transaction.update(workerRef, { walletBalance: (worker.walletBalance || 0) + workerPayout });
          const platformRef = doc(db, "platform", "data");
          const platformDoc = await transaction.get(platformRef);
          const currentRev = platformDoc.exists() ? platformDoc.data().revenue || 0 : 0;
          transaction.set(platformRef, { revenue: currentRev + commission }, { merge: true });
        }
        job.paymentStatus = 'RELEASED';
        job.status = 'COMPLETED';
        job.statusHistory.push({ status: 'COMPLETED', timestamp: Date.now(), note: `Job verified via QR. Payment ${isEscrow ? 'released' : 'confirmed'}.` });
        const notifRef = doc(collection(db, "notifications"));
        transaction.set(notifRef, { id: notifRef.id, userId: worker.id, message: `QR Verified! Job Complete. ${isEscrow ? `₹${workerPayout} added to wallet.` : 'Collect cash from client.'}`, type: isEscrow ? 'payment' : 'success', read: false, timestamp: Date.now() });
        transaction.update(jobRef, job);
        return { success: true, payout: isEscrow ? workerPayout : 0, commission: isEscrow ? commission : 0 };
      });
    } catch (error) { handleFirestoreError(error, 'write', "jobs/users"); throw error; }
  },
  updateJobStatus: async (jobId, status) => {
    try {
      const jobRef = doc(db, "jobs", jobId);
      const jobDoc = await getDoc(jobRef);
      if (!jobDoc.exists()) throw new Error("Job not found");
      const job = jobDoc.data();
      job.status = status;
      job.statusHistory.push({ status, timestamp: Date.now(), note: `Status updated to ${status}` });
      await updateDoc(jobRef, { status: job.status, statusHistory: job.statusHistory });
      return job;
    } catch (error) { handleFirestoreError(error, 'update', "jobs"); throw error; }
  },
  rateWorker: async (jobId, rating) => {
    try {
      return await runTransaction(db, async (transaction) => {
        const jobRef = doc(db, "jobs", jobId);
        const jobDoc = await transaction.get(jobRef);
        if (!jobDoc.exists()) throw new Error("Job not found");
        const job = jobDoc.data();
        if (!job.assignedWorkerId) throw new Error("No worker assigned");
        if (job.status !== 'COMPLETED') throw new Error("Job must be completed to rate");
        const workerRef = doc(db, "users", job.assignedWorkerId);
        const workerDoc = await transaction.get(workerRef);
        const worker = workerDoc.data();
        const ratingRef = doc(collection(db, "ratings"));
        const newRating = { id: ratingRef.id, jobId: job.id, workerId: worker.id, clientId: job.clientId, stars: rating.stars, comment: rating.comment, timestamp: Date.now() };
        transaction.set(ratingRef, newRating);
        transaction.update(jobRef, { isRated: true });
        const currentAvg = worker.workerProfile?.rating || 0;
        const currentCount = worker.workerProfile?.ratingCount || 0;
        const newCount = currentCount + 1;
        const newAvg = ((currentAvg * currentCount) + rating.stars) / newCount;
        transaction.update(workerRef, { "workerProfile.rating": parseFloat(newAvg.toFixed(1)), "workerProfile.ratingCount": newCount });
        const publicProfileRef = doc(db, "public_profiles", worker.id);
        transaction.update(publicProfileRef, { "workerProfile.rating": parseFloat(newAvg.toFixed(1)), "workerProfile.ratingCount": newCount });
        return newRating;
      });
    } catch (error) { handleFirestoreError(error, 'write', "ratings/jobs/users"); throw error; }
  },
  getJobMessages: async (jobId) => {
    try {
      const q = query(collection(db, "messages"), where("jobId", "==", jobId), orderBy("timestamp", "asc"));
      const snapshot = await getDocs(q);
      return snapshot.docs.map(d => d.data());
    } catch (error) { handleFirestoreError(error, 'list', "messages"); throw error; }
  },
  sendMessage: async (jobId, senderId, text) => {
    try {
      const msgRef = doc(collection(db, "messages"));
      const newMessage = { id: msgRef.id, jobId, senderId, text, timestamp: Date.now(), read: false };
      await setDoc(msgRef, newMessage);
      return newMessage;
    } catch (error) { handleFirestoreError(error, 'create', "messages"); throw error; }
  },
  markMessagesAsRead: async (jobId, userId) => {
    try {
      const q = query(collection(db, "messages"), where("jobId", "==", jobId), where("read", "==", false));
      const snapshot = await getDocs(q);
      const promises = snapshot.docs.map(docSnapshot => {
        const msg = docSnapshot.data();
        if (msg.senderId !== userId) return updateDoc(docSnapshot.ref, { read: true });
        return Promise.resolve();
      });
      await Promise.all(promises);
    } catch (error) { handleFirestoreError(error, 'update', "messages"); throw error; }
  },
  getUnreadCounts: async (userId) => {
    try {
      const q = query(collection(db, "messages"), where("read", "==", false));
      const snapshot = await getDocs(q);
      const counts = {};
      snapshot.docs.forEach(d => {

    } catch (error) { handleFirestoreError(error, 'list', "public_profiles"); throw error; }
  },
  getAllClients: async () => {
    try {
      const q = query(collection(db, "public_profiles"), where("role", "==", "client"));
      const snapshot = await getDocs(q);
      return snapshot.docs.map(d => d.data());
    } catch (error) { handleFirestoreError(error, 'list', "public_profiles"); throw error; }
  },
  getWorkersByIds: async (ids) => {
    if (!ids || ids.length === 0) return [];
    try {
      const chunks = [];
      for (let i = 0; i < ids.length; i += 10) chunks.push(ids.slice(i, i + 10));
      const results = [];
      for (const chunk of chunks) {
        const q = query(collection(db, "public_profiles"), where("id", "in", chunk));
        const snapshot = await getDocs(q);
        results.push(...snapshot.docs.map(d => d.data()));
      }
      return results;
    } catch (error) { handleFirestoreError(error, 'list', "public_profiles"); throw error; }
  },
  verifyUser: async (userId, isVerified) => {
    try {
      const userRef = doc(db, "users", userId);
      await updateDoc(userRef, { isVerified });
      const publicProfileRef = doc(db, "public_profiles", userId);
      await updateDoc(publicProfileRef, { isVerified }).catch(e => console.error(e));
      const updatedDoc = await getDoc(userRef);
      return updatedDoc.data();
    } catch (error) { handleFirestoreError(error, 'update', "users"); throw error; }
  }
};

const optimizeJobDescription = async (rawInput, category) => {

  } catch (error) { console.error("Gemini optimization failed:", error); return rawInput; }

const translateText = async (text, targetLangCode) => {
  try {
    const langObj = SUPPORTED_LANGUAGES.find(l => l.code === targetLangCode);
    const targetLangName = langObj?.name;
    if (!targetLangName && !targetLangCode) throw new Error("Target language not specified");
    const effectiveTarget = targetLangName || targetLangCode;
    const ai = getAI();
    const prompt = `You are a helpful translator for a local job marketplace in India. Translate the following job description into ${effectiveTarget}. Rules: 1. Keep it simple, colloquial, and easy for a daily wage worker to understand. 2. Do NOT add explanations. 3. Return ONLY the translated text. Original Text: "${text}"`;
    const response = await ai.models.generateContent({ model: 'gemini-2.0-flash', contents: prompt });
    const result = response.text?.trim();
    if (!result) throw new Error("Translation service returned empty result");
    return result;
  } catch (error) { console.error("Gemini translation failed:", error); return `Translation unavailable. Displaying original English text.`; }
};

const generateSpeech = async (text) => {
  try {
    const ai = getAI();
    const response = await ai.models.generateContent({
      model: "gemini-2.5-flash-preview-tts",
      contents: [{ parts: [{ text }] }],
      config: { responseModalities: ['AUDIO'], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: 'Kore' } } } }
    });
    return response.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data || null;
  } catch (error) { console.error("Gemini TTS failed:", error); return null; }
};

const playRawAudio = async (base64String) => {
  try {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
    const binaryString = atob(base64String);
    const bytes = new Uint8Array(binaryString.length);
    for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
    const dataInt16 = new Int16Array(bytes.buffer);
    const frameCount = dataInt16.length;
    const audioBuffer = audioContext.createBuffer(1, frameCount, 24000);
    const channelData = audioBuffer.getChannelData(0);
    for (let i = 0; i < frameCount; i++) channelData[i] = dataInt16[i] / 32768.0;
    const source = audioContext.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(audioContext.destination);
    source.start();
    return new Promise(resolve => { source.onended = () => { resolve(); audioContext.close(); }; });
  } catch (error) { console.error("Error playing audio:", error); }
};

function getDistanceKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function AppProvider({ children }) {
  const [user, setUser] = useState(null);
  const [isLoading, setIsLoading] = useState(true);
  const [currentView, setView] = useState('dashboard');
  const lastJobCheckRef = useRef(Date.now());
  const lastMessageCheckRef = useRef(Date.now());

  useEffect(() => {
    const unsubscribeAuth = onAuthStateChanged(auth, (firebaseUser) => {
      if (firebaseUser) {
        const userRef = doc(db, 'users', firebaseUser.uid);
        const unsubscribeUser = onSnapshot(userRef, (docSnap) => {
          if (docSnap.exists()) setUser(docSnap.data());
          else setUser(null);
          setIsLoading(false);
        }, (error) => { console.error("Error fetching user data:", error); setIsLoading(false); });
        return () => unsubscribeUser();
      } else {
        setUser(null);
        setIsLoading(false);
      }
    });
    return () => unsubscribeAuth();
  }, []);

  useEffect(() => {
    if (!user) return;
    let unsubscribeJobs;
    if (user.role === 'worker') {
      const jobsQuery = query(collection(db, 'jobs'), where('status', '==', 'OPEN'), orderBy('postedAt', 'desc'));
      unsubscribeJobs = onSnapshot(jobsQuery, (snapshot) => {
        const notificationsEnabled = user.notificationsEnabled ?? user.workerProfile?.notificationsEnabled ?? false;
        if (!notificationsEnabled) return;
        snapshot.docChanges().forEach((change) => {
          if (change.type === 'added') {
            const job = change.doc.data();
            if (job.postedAt > lastJobCheckRef.current) {
              lastJobCheckRef.current = Date.now();
              const hasCategory = user.workerProfile?.categories.includes(job.category);
              let hasLocation = false;
              if (user.coords && job.coords) {
                if (getDistanceKm(user.coords.lat, user.coords.lng, job.coords.lat, job.coords.lng) <= 30) hasLocation = true;
              }
              if (!hasLocation) {
                const userLoc = user.location?.toLowerCase() || '';
                const jobLoc = job.location?.toLowerCase() || '';
                if (userLoc && jobLoc && (jobLoc.includes(userLoc) || userLoc.includes(jobLoc))) hasLocation = true;
                if (!userLoc) hasLocation = true;
              }
              if (hasCategory && hasLocation) sendSystemNotification(`New ${job.category} Job Nearby!`, `${job.title} in ${job.location}`, 'job-alert');
            }
          }
        });
      });
    }
    const messagesQuery = query(collection(db, 'messages'), orderBy('timestamp', 'asc'));
    const unsubscribeMessages = onSnapshot(messagesQuery, (snapshot) => {
      const notificationsEnabled = user.notificationsEnabled ?? user.workerProfile?.notificationsEnabled ?? false;
      if (!notificationsEnabled) return;
      snapshot.docChanges().forEach((change) => {
        if (change.type === 'added') {
          const msg = change.doc.data();
          if (msg.timestamp > lastMessageCheckRef.current && msg.senderId !== user.id) {
            lastMessageCheckRef.current = Date.now();

              if (!job) return;

              if (user.role === 'client' && job.clientId === user.id) { isForMe = true; title = `Message from ${job.assignedWorkerName || 'Worker'}`; }
              else if (user.role === 'worker' && job.assignedWorkerId === user.id) { isForMe = true; title = `Message from ${job.clientName || 'Client'}`; }
              if (isForMe) sendSystemNotification(title, msg.text, 'chat-alert');
            });
          }
        }
      });
    });
    return () => { if (unsubscribeJobs) unsubscribeJobs(); unsubscribeMessages(); };
  }, [user]);

  const sendSystemNotification = (title, body, soundType) => {
    const audio = new Audio(soundType === 'job-alert' ? 'https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3' : 'https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3');
    audio.play().catch(e => console.log("Audio play failed", e));
    if (Notification.permission === 'granted') {
      const notif = new Notification(title, { body, icon: 'https://cdn-icons-png.flaticon.com/512/3043/3043233.png', tag: Date.now().toString() });
      notif.onclick = () => { window.focus(); notif.close(); };
    }
  };

  const login = async (email, pass) => {
    setIsLoading(true);
    try { await api.login(email, pass); setView('dashboard'); lastJobCheckRef.current = Date.now(); lastMessageCheckRef.current = Date.now(); }
    finally { setIsLoading(false); }
  };
  const socialLogin = async (provider, email, name) => {
    setIsLoading(true);
    try { await api.socialLogin(provider, email, name); setView('dashboard'); lastJobCheckRef.current = Date.now(); lastMessageCheckRef.current = Date.now(); }
    finally { setIsLoading(false); }
  };
  const register = async (data) => {
    setIsLoading(true);
    try { await api.register(data); setView('dashboard'); lastJobCheckRef.current = Date.now(); lastMessageCheckRef.current = Date.now(); }
    finally { setIsLoading(false); }
  };
  const logout = async () => { await api.logout(); setView('dashboard'); };
  const updateUserProfile = async (data) => {
    setIsLoading(true);
    try { await api.updateUser(data); } finally { setIsLoading(false); }
  };
  const refreshUser = () => {};
  const requestNotificationPermission = async () => {
    if (!('Notification' in window)) return;
    const permission = await Notification.requestPermission();

  };

  return React.createElement(AppContext.Provider, {
    value: { user, isLoading, currentView, setView, login, socialLogin, register, logout, updateUserProfile, refreshUser, requestNotificationPermission }
  }, children);
}

function ClientDashboard() {
  const { user, refreshUser } = useApp();
  const [activeTab, setActiveTab] = useState('post');
  const [description, setDescription] = useState('');
  const [category, setCategory] = useState('');
  const [subCategory, setSubCategory] = useState(undefined);
  const [location, setLocation] = useState(user?.location || '');
  const [budget, setBudget] = useState('');
  const [coords, setCoords] = useState(user?.coords);
  const [isOptimizing, setIsOptimizing] = useState(false);
  const [isPlayingAudio, setIsPlayingAudio] = useState(false);
  const [isPosting, setIsPosting] = useState(false);
  const [showMap, setShowMap] = useState(false);
  const [isSearching, setIsSearching] = useState(false);
  const [postSuccess, setPostSuccess] = useState(false);
  const [myJobs, setMyJobs] = useState([]);
  const [selectedJob, setSelectedJob] = useState(null);
  const [interestedWorkers, setInterestedWorkers] = useState([]);
  const [unreadCounts, setUnreadCounts] = useState({});
  const [activeChatJob, setActiveChatJob] = useState(null);
  const [jobToRate, setJobToRate] = useState(null);
  const [ratingStars, setRatingStars] = useState(0);
  const [ratingComment, setRatingComment] = useState('');
  const [isSubmittingRating, setIsSubmittingRating] = useState(false);
  const [scanJob, setScanJob] = useState(null);
  const [qrInput, setQrInput] = useState('');
  const [isProcessingPayment, setIsProcessingPayment] = useState(false);
  const [isCompletingJob, setIsCompletingJob] = useState(null);
  const [isBooking, setIsBooking] = useState(null);
  const [filterStatus, setFilterStatus] = useState('ALL');
  const [filterCategory, setFilterCategory] = useState('ALL');
  const [expandedJobId, setExpandedJobId] = useState(null);
  const [toastMessage, setToastMessage] = useState(null);
  const [showAddFunds, setShowAddFunds] = useState(false);
  const [addFundsAmount, setAddFundsAmount] = useState('1000');

  const showToast = (msg) => { setToastMessage(msg); setTimeout(() => setToastMessage(null), 3000); };

  if (!user?.name) return React.createElement('div', { className: "p-6 bg-white rounded-xl shadow-sm" },
    React.createElement('h2', { className: "text-xl font-bold mb-4" }, "Complete Profile"),
    React.createElement('input', { type: "text", placeholder: "Your Name", className: "w-full p-3 border rounded mb-4", onBlur: e => { if(e.target.value) api.updateUser({ name: e.target.value }).then(refreshUser); } }),
    React.createElement('p', { className: "text-sm text-slate-500" }, "Please enter your name to continue.")
  );

  const fetchMyJobs = async () => {
    if (user) {
      const jobs = await api.getJobs({ type: 'client', userId: user.id });
      setMyJobs(jobs);
      const counts = await api.getUnreadCounts(user.id);
      setUnreadCounts(counts);
    }
  };

  useEffect(() => { if (activeTab === 'my-jobs') fetchMyJobs(); }, [activeTab]);

  const handleOptimize = async () => {
    if (!description) return;
    setIsOptimizing(true);
    const optimized = await optimizeJobDescription(description, category || 'General');
    setDescription(optimized);
    setIsOptimizing(false);
  };

  const handleListenToDescription = async () => {
    if (!description || isPlayingAudio) return;
    setIsPlayingAudio(true);
    try {
      let textToSpeak = description;
      if (user?.language && user.language !== 'en') textToSpeak = await translateText(description, user.language);
      const base64Audio = await generateSpeech(textToSpeak);
      if (base64Audio) await playRawAudio(base64Audio);
      else showToast("Could not generate audio at this time.");
    } catch (error) { showToast("Failed to play audio."); }
    finally { setIsPlayingAudio(false); }
  };

  const handleLocationSelect = async (lat, lng) => {
    setCoords({ lat, lng }); setShowMap(false);
    try {
      const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
      const data = await response.json();
      let addr = '';
      if (data.address) {
        const parts = [data.address.road, data.address.village || data.address.suburb, data.address.city || data.address.town, data.address.state_district].filter(Boolean);
        addr = parts.length > 0 ? parts.join(', ') : data.display_name.split(',').slice(0, 3).join(',');
      } else { addr = `GPS: ${lat.toFixed(4)}, ${lng.toFixed(4)}`; }
      setLocation(addr);
    } catch { setLocation(`${lat.toFixed(5)}, ${lng.toFixed(5)}`); }
  };

  const handleSearchLocation = async () => {
    if (location && location.trim().length > 0) {
      setIsSearching(true);
      try {
        const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(location)}`);
        const data = await response.json();
        if (data && data.length > 0) setCoords({ lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) });
        else showToast("Location not found.");
      } catch { console.error("Geocoding failed"); }
      finally { setIsSearching(false); }
    }
  };

  const handlePostJob = async (e) => {
    e.preventDefault();
    if (!user || !category || !budget) return;
    setIsPosting(true);
    let finalTitle = `${category} needed in ${location}`;
    if (category === WorkerCategory.AGRICULTURE && subCategory) finalTitle = `${subCategory} needed in ${location}`;
    await api.postJob({ clientId: user.id, clientName: user.name, clientPhone: user.phone, title: finalTitle, description, category, subCategory, location, budget: parseInt(budget, 10), coords });
    setIsPosting(false); setDescription(''); setCategory(''); setSubCategory(undefined); setBudget('');
    setActiveTab('my-jobs'); setPostSuccess(true); setTimeout(() => setPostSuccess(false), 3000);
  };

  const handleViewWorkers = async (job) => {
    const latestJob = await api.getJobById(job.id);
    if (!latestJob) return;
    setSelectedJob(latestJob);
    const workers = await api.getWorkersByIds(latestJob.interestedWorkerIds);
    setInterestedWorkers(workers);
  };

  const handleBookWorker = async (workerId) => {
    if (!selectedJob) return;
    setIsBooking(workerId);
    try {
      const updatedJob = await api.bookWorker(selectedJob.id, workerId, 'CASH');
      setMyJobs(prev => prev.map(j => j.id === updatedJob.id ? updatedJob : j));
      refreshUser(); showToast("Worker Booked Successfully!"); setSelectedJob(null);
    } catch (e) { showToast("Booking failed: " + (e.message || "Unknown error")); }
    finally { setIsBooking(null); fetchMyJobs(); }
  };

  const handleMarkCompleted = async (job) => {
